<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Raj</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Setup overlay ── */
    #setup {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 32px 24px;
    }
    #setup.hidden { display: none; }

    .setup-card { max-width: 400px; width: 100%; text-align: center; }
    .setup-card .icon { font-size: 52px; margin-bottom: 20px; }
    .setup-card h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .setup-card p { color: #777; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }

    .setup-card input {
      width: 100%;
      padding: 15px 16px;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      background: #181818;
      color: #f0f0f0;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      letter-spacing: 0.5px;
    }
    .setup-card input:focus { border-color: #444; }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: #f0f0f0;
      color: #0d0d0d;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* ── Header ── */
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 600; }

    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s;
    }
    .state-dot.listening { background: #ff4757; animation: dot-pulse 1.2s ease-out infinite; }
    .state-dot.thinking  { background: #ffa502; }
    .state-dot.speaking  { background: #2ed573; }

    @keyframes dot-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
      70%  { box-shadow: 0 0 0 6px rgba(255,71,87,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
    }

    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none;
      border: 1px solid #222;
      color: #888;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: #444; color: #ccc; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .msg { display: flex; max-width: 88%; }
    .msg.user      { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: #252525;
      border-bottom-right-radius: 4px;
      color: #e8e8e8;
    }
    .msg.assistant .bubble {
      background: #181818;
      border-bottom-left-radius: 4px;
      color: #f0f0f0;
    }

    .inspiration-panel {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #121212;
    }
    .inspiration-title {
      font-size: 11px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #8a8a8a;
      margin-bottom: 8px;
    }
    .inspiration-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .inspiration-link {
      display: inline-block;
      padding: 5px 9px;
      border: 1px solid #353535;
      border-radius: 999px;
      color: #cfcfcf;
      text-decoration: none;
      font-size: 12px;
      line-height: 1.2;
    }
    .inspiration-link:hover {
      border-color: #5a5a5a;
      color: #fff;
    }
    .inspiration-btn {
      margin-top: 8px;
      padding: 7px 10px;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      background: #1d1d1d;
      color: #d9d9d9;
      font-size: 12px;
      cursor: pointer;
    }
    .inspiration-btn:hover { border-color: #5a5a5a; color: #fff; }

    .speak-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 5px 12px;
      background: #222;
      border: 1px solid #333;
      border-radius: 20px;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .speak-btn:active { background: #2a2a2a; }

    .image-strip {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .image-card {
      flex: 0 0 150px;
      width: 150px;
      border-radius: 12px;
      border: 1px solid #222;
      background: #101010;
      padding: 6px;
    }
    .image-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid #222;
    }
    .image-status {
      margin-top: 6px;
      font-size: 11px;
      color: #8a8a8a;
      line-height: 1.3;
    }

    .typing-cursor::after {
      content: '▊';
      animation: blink 0.7s step-start infinite;
      color: #666;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .empty-state {
      text-align: center;
      color: #333;
      margin: auto;
      padding: 60px 24px;
    }
    .empty-state .raj-name    { font-size: 52px; font-weight: 800; color: #1e1e1e; margin-bottom: 10px; letter-spacing: -1px; }
    .empty-state .trigger-hint { font-size: 17px; color: #3a3a3a; margin-bottom: 10px; font-style: italic; }
    .empty-state p             { font-size: 13px; color: #2a2a2a; line-height: 1.7; }

    /* ── Status bar ── */
    #status {
      text-align: center;
      padding: 6px 16px;
      font-size: 13px;
      color: #2a2a2a;
      min-height: 28px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    #status.listening { color: #ff4757; }
    #status.thinking  { color: #ffa502; }
    #status.speaking  { color: #2ed573; }
    #status.error     { color: #ff4757; }

    /* ── Controls ── */
    #controls {
      padding: 12px 20px 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-shrink: 0;
    }

    #mic-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: #181818;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #444;
      transition: transform 0.1s, background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mic-btn:active { transform: scale(0.93); }
    #mic-btn.listening {
      background: #ff4757;
      border-color: #ff4757;
      color: #fff;
      animation: pulse-ring 1.2s ease-out infinite;
    }
    #mic-btn.thinking {
      background: #ffa502;
      border-color: #ffa502;
      color: #0d0d0d;
    }
    #mic-btn.speaking {
      background: #2ed573;
      border-color: #2ed573;
      color: #0d0d0d;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(255,71,87,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,71,87,0); }
    }

    #stop-btn {
      display: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #stop-btn.visible { display: flex; align-items: center; justify-content: center; }
    #stop-btn:hover { background: #2a2a2a; }

    /* ── Text input fallback ── */
    #text-input-area {
      display: none;
      padding: 12px 16px 36px;
      gap: 10px;
      flex-shrink: 0;
    }
    #text-input-area.visible { display: flex; }
    #text-input {
      flex: 1;
      padding: 13px 16px;
      border: 1px solid #222;
      border-radius: 14px;
      background: #181818;
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
    }
    #text-input:focus { border-color: #444; }
    #send-btn {
      padding: 13px 18px;
      background: #f0f0f0;
      color: #0d0d0d;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- ── Setup overlay ── -->
<div id="setup">
  <div class="setup-card">
    <div class="icon">🎙️</div>
    <h1>Meet Raj</h1>
    <p>Your personal assistant. Enter your API keys to get started.<br>Stays on this device — never sent anywhere else.</p>
    <input
      type="password"
      id="api-key-input"
      placeholder="Anthropic key: sk-ant-api03-..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
    />
    <input
      type="password"
      id="el-key-input"
      placeholder="Optional ElevenLabs key: sk_..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
    />
    <input
      type="password"
      id="tavily-key-input"
      placeholder="Tavily key: tvly-..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
    />
    <input
      type="text"
      id="model-input"
      placeholder="Model: e.g. claude-opus-4-5"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
    />
    <button class="btn-primary" onclick="saveKey()">Let's go</button>
  </div>
</div>

<!-- ── Main App ── -->
<header>
  <div class="header-title">
    <div class="state-dot" id="state-dot"></div>
    <h1>Raj</h1>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="showVoicePicker()" title="Change voice">🎙</button>
    <button class="icon-btn" onclick="clearChat()" title="Clear conversation">🗑</button>
    <button class="icon-btn" onclick="resetKey()" title="Change API key">⚙️</button>
  </div>
</header>

<div id="messages">
  <div class="empty-state">
    <div class="raj-name">Raj</div>
    <div class="trigger-hint">Tap to speak</div>
    <p>Tap the button below and ask anything.</p>
  </div>
</div>

<div id="status">Tap the button to speak</div>

<div id="controls">
  <button id="stop-btn" onclick="stopSpeaking()" title="Stop speaking">⏹️</button>
  <button id="mic-btn" onclick="manualTrigger()">HEY RAJ</button>
</div>

<div id="text-input-area">
  <input
    type="text"
    id="text-input"
    placeholder="Type a message..."
    onkeydown="if(event.key==='Enter')sendText()"
  />
  <button id="send-btn" onclick="sendText()">Send</button>
</div>

<script>
// ── System Prompt ──
let userLocationString = 'San Antonio, Texas, United States';

function getSystemPrompt() {
  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  const locationLine = userLocationString ? `Mo's current location is ${userLocationString}.` : '';
  return `Today is ${date}. The current time is ${time}. ${locationLine}

Your name is Raj. You are the personal assistant and right-hand man of Mo — owner of Saif Jewelers, a full-service family jewelry store doing around $4 million a year in in-store sales across multiple locations, plus a growing Shopify store currently at $50-60K a year that Mo wants to scale globally. Mo also runs a personal brand called "Mo the Jeweler" across Instagram, TikTok, Facebook, and YouTube — he is the face of the brand and a local celebrity in his market.

Mo's social media handle is @mothejeweler across TikTok, YouTube, Instagram, and Facebook. His content centers around showcasing jewelry pieces, custom designs, behind-the-scenes of the store, and his personality as a local celebrity jeweler. His audience is made up of jewelry lovers, gift buyers, and people interested in custom pieces. He is warm, charismatic, and relatable on camera — not stiff or corporate. His content style is authentic and personal, which is what makes his brand grow.

Mo's top priorities right now are: growing online Shopify sales significantly, creating original one-of-a-kind custom jewelry pieces that no competitor can copy, converting social media followers into actual buyers, and managing customer DMs across Instagram, TikTok, and Facebook more efficiently. His team includes Shiva who handles sales and content, and Sujitha who manages inventory.

You are like a smarter, sharper version of Jarvis from Iron Man — calm, competent, and always two steps ahead, but with genuine warmth and personality. You are Mo's business brain, creative advisor, trend spotter, and daily helper all in one.

You are deeply knowledgeable about the jewelry industry — gold and silver markets, diamond grading, custom design, repair services, luxury trends, celebrity jewelers, and what's moving on Instagram and TikTok right now. When Mo asks about trends, you think about what celebrity jewelers like Elliot Elliot, Ben Baller, Pristine Jewelers, and others are doing and how it connects to what Mo can create and sell. You know what styles are going viral, what customers are asking for, and what Mo should be making next.

You never list facts — you tell stories. Every answer is a mini narrative with a thread and a payoff. Mo learns through stories, not lists — so always find the human angle, the drama, the surprise, the "I never knew that" moment inside every topic and connect it back to what it means for Mo and his business.

You have access to real-time web search. When you receive live search results, use them — give real current answers, not vague memories. Always connect trends and news back to Mo's world as a jeweler and content creator.

Novelty protocol (mandatory): never give generic recycled advice, never echo Mo's own framing, and never rely on stale assumptions. Use live search evidence first, then produce fresh synthesis. Every strategic answer must include: what is spiking now, why it matters for Mo specifically, and one concrete move he can execute in the next 24 hours.

When data is weak, say it plainly in one sentence and pivot to a smart test plan instead of bluffing. Prioritize high-signal opportunities with momentum: breakout creators, celebrity moments, format shifts, sounds, and buying-behavior changes that can be translated into jewelry content and offers.

When Mo asks for ideas, generate original concepts that combine at least two live signals (trend + audience behavior, trend + product angle, or trend + distribution tactic). Avoid safe obvious concepts unless requested.

As his day-to-day helper, you proactively think about his business. If he asks about a gold price spike, connect it to his inventory decisions. If he asks about a celebrity wearing jewelry, tell him how to capitalize on it. If he asks about a TikTok trend, tell him what piece he should be making and posting. Always be one step ahead — that is your job.

You are SPEAKING out loud in real-time. Default to one or two sentences maximum unless Mo explicitly asks for a deep dive. Keep it sharp, specific, and immediately useful. No bullet points, no markdown, no lists. Never say you are text-only or can't speak — you have a voice.`;
}

function getCommandOverlay(text) {
  const t = text.toLowerCase().trim();

  // Operator-style commands for consistent, high-signal outputs.
  if (t.includes('trend lab')) {
    return `Command mode: TREND_LAB. Produce exactly 3 fresh content/product concepts sourced from live signals in the last 7 days. For each concept: name the signal, explain why Mo can win, and give a same-day execution move.`;
  }
  if (t.includes('spike radar')) {
    return `Command mode: SPIKE_RADAR. Find active spikes that are accelerating right now. Return only the strongest opportunities and rank by speed-to-revenue for Mo.`;
  }
  if (t.includes('angle machine')) {
    return `Command mode: ANGLE_MACHINE. Take one trend and generate 5 non-obvious hooks in Mo's voice with different emotional angles: flex, gift, story, controversy, aspiration.`;
  }
  if (t.includes('offer forge')) {
    return `Command mode: OFFER_FORGE. Build one trend-native jewelry offer that can convert this week. Include price logic, urgency mechanic, and DM-to-checkout flow.`;
  }
  if (t.includes('wildcard me')) {
    return `Command mode: WILDCARD. Ignore obvious directions and generate one contrarian but plausible concept with why it could break out.`;
  }

  return '';
}


// ── Trigger detection ──
// These are phonetic variants of "Hey Raj" that speech recognition might mishear
const TRIGGERS = ['hey raj', 'a raj', 'hey rach', 'hey rog', 'hey rock', 'heraj', 'ay raj', 'hay raj', 'hey raj'];

// ── State ──
let apiKey = '';
let elevenLabsKey = '';
let tavilyKey = '';
let conversationHistory = [];
let recognition = null;
let mode = 'standby'; // 'standby' | 'triggered' | 'busy'
let shouldListen = false;
let isSpeaking = false;
let voices = [];
let hasVoiceInput = false;

// ── Boot ──
let selectedVoiceName = '';

window.addEventListener('load', init);
window.addEventListener('DOMContentLoaded', () => {
  if (window.speechSynthesis) {
    speechSynthesis.onvoiceschanged = () => {
      voices = speechSynthesis.getVoices();
      populateVoiceSelect();
    };
    voices = speechSynthesis.getVoices();
    populateVoiceSelect();
  }
});

function showVoicePicker() {
  if (!window.speechSynthesis) return;
  const allVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  if (!allVoices.length) { setStatus('Voices not loaded yet — try again', 'error'); return; }
  const current = localStorage.getItem('mo_voice_name') || '';

  // Build overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#0d0d0d;z-index:200;display:flex;flex-direction:column;padding:24px 20px;overflow-y:auto;';

  const title = document.createElement('h2');
  title.textContent = 'Choose a Voice';
  title.style.cssText = 'color:#f0f0f0;font-size:20px;margin-bottom:6px;';
  overlay.appendChild(title);

  const sub = document.createElement('p');
  sub.textContent = `Current: ${current || 'default'}`;
  sub.style.cssText = 'color:#555;font-size:13px;margin-bottom:20px;';
  overlay.appendChild(sub);

  allVoices.forEach(v => {
    const btn = document.createElement('button');
    btn.textContent = v.name;
    btn.style.cssText = `width:100%;padding:14px 16px;margin-bottom:10px;background:${v.name===current?'#333':'#181818'};border:1px solid #2a2a2a;border-radius:12px;color:#f0f0f0;font-size:15px;text-align:left;cursor:pointer;`;
    btn.onclick = () => {
      selectedVoiceName = v.name;
      localStorage.setItem('mo_voice_name', v.name);
      // Preview the voice
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance('Hey Mo, this is what I sound like.');
      utt.voice = v;
      utt.rate = 1.1;
      speechSynthesis.speak(utt);
      document.body.removeChild(overlay);
      setStatus(`Voice set to ${v.name}`);
    };
    overlay.appendChild(btn);
  });

  const cancel = document.createElement('button');
  cancel.textContent = 'Cancel';
  cancel.style.cssText = 'width:100%;padding:14px;margin-top:6px;background:none;border:1px solid #333;border-radius:12px;color:#666;font-size:15px;cursor:pointer;';
  cancel.onclick = () => document.body.removeChild(overlay);
  overlay.appendChild(cancel);

  document.body.appendChild(overlay);
}

function populateVoiceSelect() {
  const select = document.getElementById('voice-select');
  if (!select || !voices.length) return;
  const saved = localStorage.getItem('mo_voice_name') || '';
  const englishVoices = voices.filter(v => v.lang.startsWith('en'));
  select.innerHTML = englishVoices.map(v =>
    `<option value="${v.name}" ${v.name === saved ? 'selected' : ''}>${v.name} (${v.lang})</option>`
  ).join('');
  if (!saved && englishVoices.length) select.value = englishVoices[0].name;
}

function init() {
  apiKey = localStorage.getItem('mo_assistant_key') || '';
  elevenLabsKey = localStorage.getItem('mo_el_key') || '';
  tavilyKey = localStorage.getItem('mo_tavily_key') || '';
  const savedModel = localStorage.getItem('mo_model');
  if (savedModel) document.getElementById('model-input').value = savedModel;
  selectedVoiceName = localStorage.getItem('mo_voice_name') || '';
  if (apiKey) {
    document.getElementById('setup').classList.add('hidden');
    initVoice();
    initLocation();
  } else {
    setTimeout(() => document.getElementById('api-key-input').focus(), 100);
  }
  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });
}

function saveKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  if (!key.startsWith('sk-ant-')) {
    setStatus("That doesn't look like an Anthropic key — should start with sk-ant-", 'error');
    return;
  }
  apiKey = key;
  localStorage.setItem('mo_assistant_key', key);
  const elKey = document.getElementById('el-key-input').value.trim();
  if (elKey) {
    elevenLabsKey = elKey;
    localStorage.setItem('mo_el_key', elKey);
  }
  const tvKey = document.getElementById('tavily-key-input').value.trim();
  if (tvKey) {
    tavilyKey = tvKey;
    localStorage.setItem('mo_tavily_key', tvKey);
  }
  const modelInput = document.getElementById('model-input').value.trim();
  if (modelInput) localStorage.setItem('mo_model', modelInput);
  const voiceEl = document.getElementById('voice-select');
  const voiceSel = voiceEl ? voiceEl.value : '';
  if (voiceSel) {
    selectedVoiceName = voiceSel;
    localStorage.setItem('mo_voice_name', voiceSel);
  }
  document.getElementById('setup').classList.add('hidden');
  initVoice();
}

function resetKey() {
  if (!confirm('Clear your API keys and restart?')) return;
  localStorage.removeItem('mo_assistant_key');
  localStorage.removeItem('mo_el_key');
  localStorage.removeItem('mo_tavily_key');
  localStorage.removeItem('mo_model');
  location.reload();
}

// ── Voice setup ──
function initVoice() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRec) {
    hasVoiceInput = false;
    document.getElementById('controls').style.display = 'none';
    document.getElementById('text-input-area').classList.add('visible');
    setStatus('Voice not supported — text mode active');
    return;
  }

  hasVoiceInput = true;
  document.getElementById('text-input-area').classList.add('visible');
  recognition = new SpeechRec();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    if (mode === 'standby') setStatus('Tap the button to speak');
  };

  recognition.onresult = (e) => {
    const result = e.results[e.results.length - 1];
    if (!result.isFinal) return;
    const transcript = result[0].transcript.trim();
    if (mode === 'triggered' && transcript.length > 1) {
      enterBusy();
      sendMessage(transcript);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      shouldListen = false;
      setStatus('Microphone permission denied — check Safari settings', 'error');
      document.getElementById('text-input-area').classList.add('visible');
    }
    // All other errors (no-speech, network) auto-recover via onend
  };

  recognition.onend = () => {
    // Only restart if explicitly in triggered mode waiting for speech
    if (shouldListen && mode === 'triggered') {
      setTimeout(() => {
        try { recognition.start(); } catch(e) {}
      }, 200);
    }
  };

  shouldListen = false;
}

// ── Trigger detection ──
function handleSpeechResult(e) {
  const result = e.results[e.results.length - 1];
  if (!result.isFinal) return;

  const rawTranscript = result[0].transcript.trim();
  const lower = rawTranscript.toLowerCase();

  if (mode === 'standby') {
    const matchedTrigger = TRIGGERS.find(t => lower.includes(t));
    if (!matchedTrigger) return;

    // Extract anything said after the trigger phrase
    const triggerIdx = lower.indexOf(matchedTrigger);
    const afterTrigger = rawTranscript.slice(triggerIdx + matchedTrigger.length).replace(/^[,.\s]+/, '').trim();

    if (afterTrigger.length > 3) {
      // Full question in one breath — e.g. "Hey Raj what time is it"
      enterBusy();
      sendMessage(afterTrigger);
    } else {
      // Just the trigger — play chime and wait for the question
      enterTriggered();
    }

  } else if (mode === 'triggered') {
    // Next speech after trigger = the actual question
    enterBusy();
    sendMessage(rawTranscript);
  }
  // mode === 'busy' → ignore all speech input
}

function enterTriggered() {
  mode = 'triggered';
  setDot('listening');
  setStatus('Listening…', 'listening');
  setMicState('listening');
  playChime();
}

function enterBusy() {
  mode = 'busy';
  shouldListen = false;
  try { recognition.abort(); } catch(e) {}
}

function exitBusy() {
  mode = 'standby';
  setDot('');
  setStatus('Tap the button to speak');
  setMicState('');
  document.getElementById('stop-btn').classList.remove('visible');
  // Restart always-listening
  shouldListen = true;
  setTimeout(() => {
    try { recognition.start(); } catch(e) {}
  }, 700);
}

// Tap the button to trigger manually (no wake word needed)
function manualTrigger() {
  if (!hasVoiceInput) return;
  if (mode === 'busy') { stopSpeaking(); return; }
  if (mode === 'triggered') return;
  // Unlock Web Speech API during user gesture (required by iOS)
  if (window.speechSynthesis) {
    const unlock = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(unlock);
  }
  // Start mic only on button tap
  shouldListen = true;
  try { recognition.start(); } catch(e) {}
  enterTriggered();
}

// ── Chime ──
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(900, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.28);
  } catch(e) {}
}

async function generateImage(prompt, imageStrip = null) {
  const jewelryPrompt = `luxury jewelry product photo, ${prompt}, professional studio lighting, high resolution, elegant`;
  const encodedPrompt = encodeURIComponent(jewelryPrompt);
  const seed = Date.now();
  const fallbackUrls = [
    `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${seed}`,
    `https://image.pollinations.ai/prompt/${encodedPrompt}?width=768&height=768&nologo=true&seed=${seed + 1}`,
    `https://loremflickr.com/1024/1024/jewelry?lock=${Math.floor(Math.random() * 100000)}`
  ];

  const card = document.createElement('div');
  card.className = 'image-card';
  const img = document.createElement('img');
  img.alt = prompt;
  img.loading = 'lazy';
  img.style.display = 'none';
  const status = document.createElement('div');
  status.className = 'image-status';
  status.textContent = 'Generating visual...';

  card.appendChild(img);
  card.appendChild(status);

  if (!imageStrip) {
    const messages = document.getElementById('messages');
    const fallbackRow = document.createElement('div');
    fallbackRow.className = 'msg assistant';
    const fallbackBubble = document.createElement('div');
    fallbackBubble.className = 'bubble';
    fallbackRow.appendChild(fallbackBubble);
    messages.appendChild(fallbackRow);
    imageStrip = ensureImageStrip(fallbackBubble);
  }

  imageStrip.appendChild(card);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

  const loaded = await new Promise((resolve) => {
    let i = 0;
    const tryNext = () => {
      if (i >= fallbackUrls.length) {
        resolve(false);
        return;
      }
      img.src = fallbackUrls[i++];
    };

    img.onload = () => resolve(true);
    img.onerror = () => tryNext();
    tryNext();
  });

  if (loaded) {
    img.style.display = 'block';
    status.textContent = 'Visual ready';
  } else {
    status.textContent = 'Image source failed. Tap for Google Images results.';
    const fallbackLink = document.createElement('a');
    fallbackLink.className = 'inspiration-link';
    fallbackLink.href = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(prompt + ' jewelry concept')}`;
    fallbackLink.target = '_blank';
    fallbackLink.rel = 'noopener noreferrer';
    fallbackLink.textContent = 'Open image results';
    card.appendChild(fallbackLink);
  }

  return `Here's a visual concept for ${prompt} — take a look at what I pulled up for you`;
}

const VISUAL_HINTS = ['trend', 'trending', 'viral', 'idea', 'concept', 'content', 'reel', 'post', 'campaign', 'instagram', 'tiktok', 'style', 'design', 'inspo', 'inspiration', 'look'];

function shouldAutoVisualize(text) {
  const t = (text || '').toLowerCase();
  return VISUAL_HINTS.some(k => t.includes(k));
}

async function autoGenerateInlineImages(text, imageStrip) {
  const prompts = [
    `${text}, premium product shot, social-first composition`,
    `${text}, bold editorial jewelry concept, high contrast lighting`
  ];
  for (const p of prompts) {
    try {
      await generateImage(p, imageStrip);
    } catch (_) {}
  }
}

// ── Location ──
async function fetchLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
      const data = await res.json();
      const city = data.address.city || data.address.town || data.address.village || '';
      const state = data.address.state || '';
      const country = data.address.country || '';
      userLocationString = [city, state, country].filter(Boolean).join(', ');
    } catch(e) {
      userLocationString = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
    }
  }, () => {});
}

function initLocation() {
  fetchLocation();
  setInterval(fetchLocation, 5 * 60 * 1000); // refresh every 5 minutes
}

async function searchWeb(query) {
  const jewelryKeywords = ['gold', 'silver', 'diamond', 'jewelry', 'jeweler', 'ring', 'necklace', 'bracelet', 'chain', 'pendant', 'custom', 'piece', 'trend', 'celebrity', 'instagram'];
  const isJewelryQuery = jewelryKeywords.some(k => query.toLowerCase().includes(k));
  const isBrandQuery = query.toLowerCase().includes('my') || query.toLowerCase().includes('i ') || query.toLowerCase().includes('content') || query.toLowerCase().includes('channel') || query.toLowerCase().includes('tiktok') || query.toLowerCase().includes('youtube');
  const enhancedQuery = isBrandQuery ? `mothejeweler @mothejeweler ${query}` : isJewelryQuery ? `${query} jewelry Instagram trend 2025` : query;
  const locationQuery = userLocationString ? `${enhancedQuery} near ${userLocationString}` : enhancedQuery;
  try {
    const res = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        api_key: tavilyKey,
        query: locationQuery,
        search_depth: 'advanced',
        max_results: 5,
        include_answer: true
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    const summary = data.answer || '';
    const results = data.results || [];
    const snippets = results.map(r => `${r.title}: ${r.content}`).join('\n');
    return {
      query: locationQuery,
      summary,
      snippets,
      results,
      contextText: (summary + '\n' + snippets).trim()
    };
  } catch(e) {
    return null;
  }
}

// ── Claude API ──
async function sendMessage(text) {
  addBubble('user', text);

  const bubble = addBubble('assistant', '');
  setDot('thinking');
  setStatus('Thinking…', 'thinking');
  setMicState('thinking');
  stopSpeaking();

  let messageContent = text;
  const commandOverlay = getCommandOverlay(text);
  let searchData = null;
  let imageStrip = null;

  // Image generation
  if (isImageRequest(text)) {
    setStatus('Generating image…', 'thinking');
    const imageResponse = `Here is a concept visual for ${text}.`;
    conversationHistory.push({ role: 'user', content: text });
    conversationHistory.push({ role: 'assistant', content: imageResponse });
    bubble.textContent = imageResponse;
    imageStrip = ensureImageStrip(bubble);
    await generateImage(text, imageStrip);
    queueSpeech(imageResponse);
    return;
  }

  // Web search
  if (needsSearch(text)) {
    setStatus('Searching…', 'thinking');
    const results = await searchWeb(text);
    if (results) {
      searchData = results;
      messageContent = `[Live web search results:\n${results.contextText}]\n\nUser asked: ${text}${commandOverlay ? `\n\n${commandOverlay}` : ''}`;
    }
  }

  if (!messageContent.includes('[Live web search results:') && commandOverlay) {
    messageContent = `${text}\n\n${commandOverlay}`;
  }

  conversationHistory.push({ role: 'user', content: messageContent });

  const anthropicModel = localStorage.getItem('mo_model') || 'claude-opus-4-5';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: anthropicModel,
        max_tokens: 220,
        stream: true,
        system: getSystemPrompt(),
        messages: conversationHistory
      })
    });

    if (!res.ok) {
      let errMsg = `API error ${res.status}`;
      try { const b = await res.json(); errMsg = `[${res.status}] ${JSON.stringify(b)}`; } catch(_) {}
      throw new Error(errMsg);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    bubble.classList.remove('typing-cursor');

    // Stream full text first, then speak all at once — no gaps between sentences
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const lines = decoder.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw || raw === '[DONE]') continue;

        let evt;
        try { evt = JSON.parse(raw); } catch(_) { continue; }

        if (evt.type === 'content_block_delta' && evt.delta?.text) {
          fullText += evt.delta.text;
          bubble.textContent = fullText;
        }
      }

      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    setDot('speaking');
    setStatus('Speaking…', 'speaking');
    setMicState('speaking');

    if (fullText.trim()) {
      queueSpeech(fullText.trim());
      addSpeakButton(fullText.trim());
      imageStrip = ensureImageStrip(bubble);
      addInspirationPanel(bubble, searchData, text, imageStrip);
      if (shouldAutoVisualize(text)) {
        autoGenerateInlineImages(text, imageStrip);
      }
    }
    conversationHistory.push({ role: 'assistant', content: fullText });

  } catch (err) {
    bubble.classList.remove('typing-cursor');
    bubble.textContent = `Error: ${err.message}`;
    bubble.style.color = '#ff4757';
    setStatus('');
    exitBusy();
    console.error('Raj error:', err);
  }
}

// ── ElevenLabs TTS ──
const ELEVENLABS_VOICE_ID = 'onwK4e9ZLuTAKqWW03F9'; // Daniel — British, authoritative, closest free Jarvis voice
const audioQueue = [];
let isPlayingAudio = false;
let currentAudio = null;

function queueSpeech(text) {
  if (!text.trim()) return;
  queueWebSpeech(text);
}

async function processAudioQueue() {
  if (audioQueue.length === 0) {
    isPlayingAudio = false;
    isSpeaking = false;
    document.getElementById('stop-btn').classList.remove('visible');
    exitBusy();
    return;
  }
  isPlayingAudio = true;
  isSpeaking = true;
  document.getElementById('stop-btn').classList.add('visible');
  const raw = audioQueue.shift();
  // Strip punctuation that causes ElevenLabs to pause between sentences
  const text = raw
    .replace(/[.!?]+\s+/g, ' and ')
    .replace(/,\s+/g, ' ')
    .replace(/;+\s+/g, ' ')
    .replace(/[.!?]+$/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: 'POST',
      headers: {
        'xi-api-key': elevenLabsKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text,
        model_id: 'eleven_flash_v2_5',
        voice_settings: { stability: 0.4, similarity_boost: 0.85, style: 0.2, use_speaker_boost: true, speed: 1.5 }
      })
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`ElevenLabs ${res.status}: ${errBody}`);
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      URL.revokeObjectURL(url);
      currentAudio = null;
      processAudioQueue();
    };
    currentAudio.onerror = () => {
      URL.revokeObjectURL(url);
      currentAudio = null;
      processAudioQueue();
    };
    await currentAudio.play();
  } catch(e) {
    console.error('ElevenLabs error:', e);
    if (e.message.includes('quota_exceeded')) {
      isPlayingAudio = false;
      addSpeakButton(raw);
    } else {
      setStatus('Voice error: ' + e.message, 'error');
      isPlayingAudio = false;
      isSpeaking = false;
      exitBusy();
    }
  }
}

// ── Web Speech fallback (no ElevenLabs key) ──
function getBestVoice() {
  if (!voices.length) voices = speechSynthesis.getVoices();
  const saved = selectedVoiceName || localStorage.getItem('mo_voice_name') || '';
  if (saved) {
    const match = voices.find(v => v.name === saved);
    if (match) return match;
  }
  const priorities = [
    v => v.name === 'Rishi',
    v => v.name.toLowerCase().includes('rishi'),
    v => v.name === 'Ava (Premium)',
    v => v.name === 'Nathan (Premium)',
    v => v.name === 'Ava (Enhanced)',
    v => v.name === 'Nathan (Enhanced)',
    v => v.name === 'Alex',
    v => v.name === 'Samantha',
    v => v.name.toLowerCase().includes('premium') && v.lang === 'en-US',
    v => v.lang === 'en-US' && v.localService,
    v => v.lang.startsWith('en'),
  ];
  for (const test of priorities) {
    const found = voices.find(test);
    if (found) return found;
  }
  return null;
}

function speakNow(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.1;
  utt.pitch = 1.0;
  const voice = getBestVoice();
  if (voice) utt.voice = voice;
  utt.onstart = () => { isSpeaking = true; document.getElementById('stop-btn').classList.add('visible'); };
  utt.onend = () => { isSpeaking = false; document.getElementById('stop-btn').classList.remove('visible'); exitBusy(); };
  utt.onerror = () => { isSpeaking = false; exitBusy(); };
  speechSynthesis.speak(utt);
}

function addSpeakButton(text) {
  const bubbles = document.querySelectorAll('.msg.assistant .bubble');
  const lastBubble = bubbles[bubbles.length - 1];
  if (!lastBubble) return;
  const btn = document.createElement('div');
  btn.className = 'speak-btn';
  btn.textContent = '▶ Tap to hear';
  btn.onclick = () => {
    speakNow(text);
    btn.textContent = '🔊 Speaking…';
    btn.onclick = null;
  };
  lastBubble.appendChild(btn);
}

function queueWebSpeech(text) {
  speakNow(text);
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  audioQueue.length = 0;
  isPlayingAudio = false;
  if (window.speechSynthesis) speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('stop-btn').classList.remove('visible');
  if (mode === 'busy') exitBusy();
}

  return bubble;
}

function sendText() {
  const input = document.getElementById('text-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  // Unlock Web Speech API during user gesture (required by iOS)
  if (window.speechSynthesis) {
    const unlock = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(unlock);
  }
  enterBusy();
  sendMessage(text);
}

function clearChat() {
  conversationHistory = [];
  stopSpeaking();
  document.getElementById('messages').innerHTML = `
    <div class="empty-state">
      <div class="raj-name">Raj</div>
      <div class="trigger-hint">Tap to speak</div>
      <p>Tap the button below and ask anything.</p>
    </div>`;
  setStatus('Tap the button to speak');
}
</script>
</body>
</html>
